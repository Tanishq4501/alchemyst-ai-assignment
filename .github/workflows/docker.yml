name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main]
    paths:
      - "docker/**"

env:
  REGION: us-central1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 deprecation

jobs:
  build:
    name: Build ${{ matrix.worker }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [caller-worker, inference-worker]

    permissions:
      contents: read
      id-token: write  # for Workload Identity Federation (push only)

    steps:
      - uses: actions/checkout@v4

      # Build always — no registry auth needed for a local build
      - name: Build image
        run: |
          docker build \
            -t alchemist/${{ matrix.worker }}:ci \
            docker/${{ matrix.worker }}

      # Auth + push only on merges to main (secrets context not allowed in if:)
      - name: Authenticate to GCP
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Tag & push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          REGISTRY="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/alchemist"
          docker tag alchemist/${{ matrix.worker }}:ci "${REGISTRY}/${{ matrix.worker }}:${{ github.sha }}"
          docker tag alchemist/${{ matrix.worker }}:ci "${REGISTRY}/${{ matrix.worker }}:latest"
          docker push "${REGISTRY}/${{ matrix.worker }}:${{ github.sha }}"
          docker push "${REGISTRY}/${{ matrix.worker }}:latest"

      - name: Output image digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker inspect \
            "${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/alchemist/${{ matrix.worker }}:${{ github.sha }}" \
            --format='{{index .RepoDigests 0}}'
