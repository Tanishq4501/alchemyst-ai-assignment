name: Build & Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - ".github/workflows/docker.yml"
  pull_request:
    branches: [main]
    paths:
      - "docker/**"

env:
  REGION: us-central1
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

jobs:
  build:
    name: Build ${{ matrix.worker }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [caller-worker, inference-worker]

    permissions:
      contents: read
      id-token: write  # for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/alchemist/${{ matrix.worker }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/alchemist/${{ matrix.worker }}:latest \
            docker/${{ matrix.worker }}

      # Only push on merge to main (not on PRs)
      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/alchemist/${{ matrix.worker }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/alchemist/${{ matrix.worker }}:latest

      - name: Output image digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker inspect \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/alchemist/${{ matrix.worker }}:${{ steps.tag.outputs.tag }} \
            --format='{{index .RepoDigests 0}}'
