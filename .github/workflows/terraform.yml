name: Terraform CI/CD

on:
  workflow_dispatch:   # allow manual trigger from the Actions tab

  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

env:
  TF_VERSION: "1.9.5"
  WORKING_DIR: terraform/envs/prod
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node.js 20 deprecation

permissions:
  contents: read
  id-token: write        # Workload Identity Federation
  pull-requests: write   # post plan as PR comment

jobs:
  # ── Lint & validate ──────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt check
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform fmt -check -recursive ../../

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: |
          tflint --init
          tflint --recursive
        working-directory: ${{ env.WORKING_DIR }}

      - name: tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
          tfsec ${{ env.WORKING_DIR }} --soft-fail

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.WORKING_DIR }}
          soft_fail: true

  # ── Plan (PRs only) ──────────────────────────────────────────────────────────
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: terraform plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="image_tag=${{ github.sha }}" \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n\n... truncated ...'
              : plan;
            const body = `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1

  # ── Apply (main branch, manual approval via GitHub Environment) ──────────────
  # NOTE: requires a "production" Environment in GitHub Settings > Environments
  # with WIF_PROVIDER + WIF_SERVICE_ACCOUNT secrets configured.
  # The job will be skipped automatically if those secrets are empty.
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: validate
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.ENABLE_APPLY == 'true'
    environment: production   # requires manual approval in GitHub Settings > Environments
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: terraform init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init

      - name: terraform apply
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform apply \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="image_tag=${{ github.sha }}" \
            -auto-approve

      - name: Run smoke test
        run: |
          PUBLIC_IP=$(cd ${{ env.WORKING_DIR }} && terraform output -raw api_gateway_public_ip)
          bash scripts/smoke-test.sh "${PUBLIC_IP}"
